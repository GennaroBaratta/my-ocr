pipeline:
  maas:
    enabled: false

  # Keep this file self-contained.
  # GLM-OCR validates it against code defaults and does not merge it with the
  # richer sample config shipped inside the package.
  page_loader:
    task_prompt_mapping:
      text: "Text Recognition:"
      table: "Table Recognition:"
      formula: "Formula Recognition:"

  result_formatter:
    label_visualization_mapping:
      table:
        - table
      formula:
        - formula
        - display_formula
        - inline_formula
      image:
        - chart
        - image
      text:
        - abstract
        - algorithm
        - content
        - doc_title
        - figure_title
        - paragraph_title
        - reference_content
        - text
        - vertical_text
        - vision_footnote
        - seal
        - formula_number

  layout:
    model_dir: PaddlePaddle/PP-DocLayoutV3_safetensors
    label_task_mapping:
      text:
        - abstract
        - algorithm
        - content
        - doc_title
        - figure_title
        - paragraph_title
        - reference_content
        - text
        - vertical_text
        - vision_footnote
        - seal
        - formula_number
      table:
        - table
      formula:
        - formula
        - display_formula
        - inline_formula
      skip:
        - chart
        - image
      abandon:
        - header
        - footer
        - number
        - footnote
        - aside_text
        - reference
        - footer_image
        - header_image

  inference:
    # Supported providers: ollama, openai_compatible.
    # OpenAI-compatible/vLLM support is client-only; run that server separately.
    provider: ollama
    base_url: http://localhost:11434
    model: glm-ocr-8k:latest
    # max_tokens maps to Ollama num_predict or OpenAI-compatible max_tokens.
    # num_ctx is an Ollama context option.
    num_ctx: 8192
    max_tokens:
    # api_key is normally blank for local Ollama. For OpenAI-compatible providers,
    # it is sent as an Authorization Bearer token when present.
    api_key:
    # extra carries provider-specific request options. OpenAI-compatible providers
    # merge these into the top-level raw HTTP body and reject deprecated guided_* fields.
    extra:
      keep_alive: 15m

    # OpenAI-compatible/vLLM example:
    # provider: openai_compatible
    # base_url: http://localhost:8000/v1
    # model: qwen2-vl
    # api_key: local-token-if-needed
    # max_tokens: 1024
    # num_ctx:
    # extra:
    #   top_k: 5
