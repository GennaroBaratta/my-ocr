<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Doc Extract - Document Review Workspace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Fira+Code:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5A67D8",
                        "background-dark": "#0F1115",
                        "surface": "#181B21",
                        "surface-elevated": "#22262E",
                        "text-main": "#E2E8F0",
                        "text-muted": "#94A3B8",
                        "border-color": "#2E333D",
                        "accent-box": "#F6E05E",
                        "success": "#48BB78",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "mono": ["Fira Code", "monospace"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem", // 6px
                        "md": "0.375rem",
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-dark text-text-main font-sans h-screen w-screen overflow-hidden flex flex-col">
<!-- Top Toolbar -->
<header class="h-12 bg-surface border-b border-border-color flex items-center justify-between px-4 shrink-0">
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 cursor-pointer hover:text-white transition-colors text-text-muted">
<span class="material-symbols-outlined text-xl" data-icon="arrow_back">arrow_back</span>
<span class="text-sm font-medium">Back</span>
</div>
<div class="h-4 w-px bg-border-color"></div>
<div class="flex items-center gap-2 text-text-main">
<span class="material-symbols-outlined text-lg" data-icon="description">description</span>
<h1 class="text-sm font-semibold truncate max-w-[200px]">invoice_scan_oct_2023.pdf</h1>
</div>
</div>
<div class="flex items-center gap-4">
<!-- Pagination / Zoom Controls -->
<div class="flex items-center bg-background-dark rounded border border-border-color h-8">
<button class="px-2 h-full flex items-center justify-center text-text-muted hover:text-text-main hover:bg-surface-elevated transition-colors border-r border-border-color" title="Previous Page">
<span class="material-symbols-outlined text-lg" data-icon="chevron_left">chevron_left</span>
</button>
<div class="px-3 text-xs font-medium text-text-main flex items-center">
                    Page 1 / 4
                </div>
<button class="px-2 h-full flex items-center justify-center text-text-muted hover:text-text-main hover:bg-surface-elevated transition-colors border-l border-border-color" title="Next Page">
<span class="material-symbols-outlined text-lg" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<div class="flex items-center bg-background-dark rounded border border-border-color h-8">
<button class="px-2 h-full flex items-center justify-center text-text-muted hover:text-text-main hover:bg-surface-elevated transition-colors border-r border-border-color" title="Zoom Out">
<span class="material-symbols-outlined text-lg" data-icon="remove">remove</span>
</button>
<div class="px-3 text-xs font-mono text-text-main flex items-center w-16 justify-center">
                    100%
                </div>
<button class="px-2 h-full flex items-center justify-center text-text-muted hover:text-text-main hover:bg-surface-elevated transition-colors border-l border-border-color" title="Zoom In">
<span class="material-symbols-outlined text-lg" data-icon="add">add</span>
</button>
</div>
<div class="h-4 w-px bg-border-color"></div>
<button class="h-8 px-4 bg-primary text-white text-xs font-semibold rounded hover:bg-opacity-90 transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="play_arrow">play_arrow</span>
                Run OCR
            </button>
</div>
</header>
<!-- Main Workspace -->
<main class="flex flex-1 overflow-hidden">
<!-- Left Sidebar (Thumbnails) -->
<aside class="w-[240px] bg-surface border-r border-border-color flex flex-col shrink-0 overflow-y-auto">
<div class="p-3 border-b border-border-color sticky top-0 bg-surface z-10">
<h2 class="text-xs font-semibold text-text-muted uppercase tracking-wider">Pages</h2>
</div>
<div class="p-3 flex flex-col gap-3">
<!-- Active Thumbnail -->
<div class="flex flex-col gap-2 cursor-pointer group">
<div class="w-full bg-background-dark aspect-[3/4] rounded border-2 border-primary relative overflow-hidden flex items-center justify-center">
<img alt="document page 1" class="w-full h-full object-cover opacity-80" data-alt="close up of a generic business invoice document with header, table of items, and total amount, dark mode styled" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0drC6xGihCFsez7nVQ1VIsQEczh7nkzFCmbqnZfJxzNsS5X-fFwGIfVMwo4GcoYOH2n-84OwcEOzQ8FK_g-l1XDtZNUr0gZJQIMdeRAK_6f4pwDIU8jBUGWMBdl1z6OMDVxBp8c5ei8dQnfbhq69Baaik4hZ8jmc7SQe6wE06Ut4p7BJB-rB6p1sZhNR-qOB4M9mqhDvKEzVWqrBKQCkFYn1IeWtaRRGhzm4w7pZ9PL81XJFXoJAolAO45UhVCkGUjOzQ6g37WqBx"/>
<div class="absolute top-1 right-1 bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-sm">1</div>
</div>
</div>
<!-- Inactive Thumbnails -->
<div class="flex flex-col gap-2 cursor-pointer group">
<div class="w-full bg-background-dark aspect-[3/4] rounded border border-border-color group-hover:border-text-muted transition-colors relative overflow-hidden flex items-center justify-center opacity-60 hover:opacity-100">
<img alt="document page 2" class="w-full h-full object-cover" data-alt="close up of a generic business invoice document page 2, dark mode styled" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDneza1L1rRfSawMoZMo0JFij3IeZUjT1FYV-b6e3FKUcemq4_5K3RTnvjrQ66W2fH1K91myti0pvJg1St-SUvPNmSOjWK0TGSpExS_RutkO540z2p5xZH0e7uLxVW4Xb5IuICvbdPqNQkhKYpi52wraCymdFNUfuPyfi1A0EquDe6OGed-iTtpKeePtFBNU_xJjZFNTtL17DQomMXeV6rdMAMONqiJKTCR3_sgDSQDWq_gdKl7b0ENpAVRH4lsZvcdecKUhv7d97Rr"/>
<div class="absolute top-1 right-1 bg-surface-elevated text-text-muted text-[10px] font-bold px-1.5 py-0.5 rounded-sm">2</div>
</div>
</div>
<div class="flex flex-col gap-2 cursor-pointer group">
<div class="w-full bg-background-dark aspect-[3/4] rounded border border-border-color group-hover:border-text-muted transition-colors relative overflow-hidden flex items-center justify-center opacity-60 hover:opacity-100">
<!-- Loading Skeleton representation -->
<div class="w-full h-full p-2 flex flex-col gap-2">
<div class="h-2 bg-border-color rounded w-3/4"></div>
<div class="h-2 bg-border-color rounded w-1/2"></div>
<div class="h-16 bg-border-color rounded w-full mt-2"></div>
</div>
<div class="absolute top-1 right-1 bg-surface-elevated text-text-muted text-[10px] font-bold px-1.5 py-0.5 rounded-sm">3</div>
</div>
</div>
</div>
</aside>
<!-- Central Canvas -->
<section class="flex-1 bg-background-dark relative overflow-auto flex items-center justify-center p-8">
<!-- Document Container (Simulating the canvas area) -->
<div class="relative bg-white shadow-lg w-[600px] h-[800px] shrink-0" data-alt="high resolution scan of a business invoice with text blocks, a data table, and a totals section at the bottom, realistic document texture" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBFGxL5tMeYkqYFQBghq6qNIR80nVVSR-_e8aDsPvaV9yr9P-q-OKhd4uQ_9jB6fPcZrx4SFzFt-ksAwpOh6rONFX4Ak0yki-WQMANVuP5fJ9-UOnqxkpojb1oA2LjeOIJBev_icN6ng0vdFr645bBF11YWsNtMk8ptE9-FUcZgqfGr4W7-6_uBBcZoKsERLSbQQhTjEl42lQpx3GFFeEdSZDKKRgBHZfe9fcwoTsXaXvDVPBwql5_8PlS_mP-TdZM5FTOy0wFBx4Ll'); background-size: cover; background-position: center;">
<!-- Bounding Box 1 (Unselected / Accent) -->
<div class="absolute top-[10%] left-[10%] w-[80%] h-[15%] border border-accent-box bg-accent-box/10 cursor-pointer group hover:bg-accent-box/20 transition-colors flex items-start justify-start p-1">
<span class="bg-accent-box text-background-dark text-[10px] font-mono px-1 rounded-sm opacity-0 group-hover:opacity-100 transition-opacity">Header</span>
<!-- Resize handles -->
<div class="absolute -top-1 -left-1 w-2 h-2 bg-accent-box rounded-sm hidden group-hover:block"></div>
<div class="absolute -top-1 -right-1 w-2 h-2 bg-accent-box rounded-sm hidden group-hover:block"></div>
<div class="absolute -bottom-1 -left-1 w-2 h-2 bg-accent-box rounded-sm hidden group-hover:block"></div>
<div class="absolute -bottom-1 -right-1 w-2 h-2 bg-accent-box rounded-sm hidden group-hover:block"></div>
</div>
<!-- Bounding Box 2 (Selected / Primary) -->
<div class="absolute top-[30%] left-[10%] w-[80%] h-[40%] border-2 border-primary bg-primary/10 cursor-move flex items-start justify-start p-1 z-10">
<span class="bg-primary text-white text-[10px] font-mono px-1 rounded-sm">Table</span>
<!-- Resize handles (active) -->
<div class="absolute -top-1.5 -left-1.5 w-3 h-3 bg-primary rounded-sm cursor-nwse-resize"></div>
<div class="absolute -top-1.5 -right-1.5 w-3 h-3 bg-primary rounded-sm cursor-nesw-resize"></div>
<div class="absolute -bottom-1.5 -left-1.5 w-3 h-3 bg-primary rounded-sm cursor-nesw-resize"></div>
<div class="absolute -bottom-1.5 -right-1.5 w-3 h-3 bg-primary rounded-sm cursor-nwse-resize"></div>
<div class="absolute top-1/2 -left-1.5 w-3 h-3 bg-primary rounded-sm -translate-y-1/2 cursor-ew-resize"></div>
<div class="absolute top-1/2 -right-1.5 w-3 h-3 bg-primary rounded-sm -translate-y-1/2 cursor-ew-resize"></div>
<div class="absolute -top-1.5 left-1/2 w-3 h-3 bg-primary rounded-sm -translate-x-1/2 cursor-ns-resize"></div>
<div class="absolute -bottom-1.5 left-1/2 w-3 h-3 bg-primary rounded-sm -translate-x-1/2 cursor-ns-resize"></div>
</div>
<!-- Bounding Box 3 (Unselected / Accent) -->
<div class="absolute top-[75%] left-[50%] w-[40%] h-[15%] border border-accent-box bg-accent-box/10 cursor-pointer group hover:bg-accent-box/20 transition-colors flex items-start justify-start p-1">
<span class="bg-accent-box text-background-dark text-[10px] font-mono px-1 rounded-sm opacity-0 group-hover:opacity-100 transition-opacity">Totals</span>
</div>
</div>
<!-- Floating zoom indicator -->
<div class="absolute bottom-6 right-6 bg-surface-elevated border border-border-color px-3 py-1.5 rounded text-xs text-text-muted shadow-lg pointer-events-none">
                Canvas Size: 600x800px
            </div>
</section>
<!-- Right Inspector -->
<aside class="w-[300px] bg-surface border-l border-border-color flex flex-col shrink-0 overflow-y-auto">
<div class="p-3 border-b border-border-color sticky top-0 bg-surface z-10 flex justify-between items-center">
<h2 class="text-xs font-semibold text-text-muted uppercase tracking-wider">Properties</h2>
<button class="text-text-muted hover:text-text-main transition-colors" title="Close Inspector">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
<div class="p-4 flex flex-col gap-6">
<!-- Header Info -->
<div class="flex items-start gap-3">
<div class="w-8 h-8 rounded bg-primary/20 text-primary flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-lg" data-icon="table_chart">table_chart</span>
</div>
<div>
<h3 class="text-sm font-medium text-text-main">Table Region</h3>
<p class="text-xs text-text-muted font-mono mt-0.5">id: box_02_tbl</p>
</div>
</div>
<!-- Attributes Form -->
<div class="flex flex-col gap-4">
<!-- Type Selection -->
<div class="flex flex-col gap-1.5">
<label class="text-xs text-text-muted font-medium">Block Type</label>
<div class="relative">
<select class="w-full h-8 bg-background-dark border border-border-color rounded text-xs text-text-main px-2 appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
<option value="text">Text Block</option>
<option selected="" value="table">Table</option>
<option value="figure">Figure / Image</option>
<option value="header">Header</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1.5 text-text-muted text-sm pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Confidence Score -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="text-xs text-text-muted font-medium">Confidence</label>
<span class="text-xs font-mono text-success">94%</span>
</div>
<div class="h-1.5 w-full bg-background-dark rounded-full overflow-hidden">
<div class="h-full bg-success rounded-full" style="width: 94%"></div>
</div>
</div>
<!-- Coordinates Grid -->
<div class="flex flex-col gap-2 mt-2">
<label class="text-xs text-text-muted font-medium border-b border-border-color pb-1">Coordinates (px)</label>
<div class="grid grid-cols-2 gap-3 mt-1">
<div class="flex flex-col gap-1">
<label class="text-[10px] text-text-muted uppercase">X (Left)</label>
<input class="h-7 bg-background-dark border border-border-color rounded text-xs font-mono text-text-main px-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary w-full" type="number" value="60"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-[10px] text-text-muted uppercase">Y (Top)</label>
<input class="h-7 bg-background-dark border border-border-color rounded text-xs font-mono text-text-main px-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary w-full" type="number" value="240"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-[10px] text-text-muted uppercase">Width</label>
<input class="h-7 bg-background-dark border border-border-color rounded text-xs font-mono text-text-main px-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary w-full" type="number" value="480"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-[10px] text-text-muted uppercase">Height</label>
<input class="h-7 bg-background-dark border border-border-color rounded text-xs font-mono text-text-main px-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary w-full" type="number" value="320"/>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex gap-2 mt-4 pt-4 border-t border-border-color">
<button class="flex-1 h-8 bg-surface-elevated hover:bg-border-color text-text-main text-xs font-medium rounded transition-colors flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="delete">delete</span>
                             Remove
                         </button>
</div>
</div>
</div>
</aside>
</main>
</body></html>
