interface:
  display_name: "Universal Dev MCP"
  short_description: "Create or maintain a dev-only streamable HTTP MCP server for tests, logs, navigation, and screenshots."
  default_prompt: "Implement or improve a project-local development MCP server for this repository."
policy:
  allow_implicit_invocation: false
dependencies:
  tools:
    - type: "mcp"
      value: "openaiDeveloperDocs"
      description: "OpenAI developer documentation MCP server"
      transport: "streamable_http"
      url: "https://developers.openai.com/mcp"
